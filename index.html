  <body>
    <div id="root"></div>

    <script type="text/babel">
      const { useEffect, useRef, useState } = React;

      const DEPARTMENTS = [
        { id: 1, name: 'Management', manager: 'Herman', avatar: 'https://i.pravatar.cc/150?img=59', active: true },
        { id: 2, name: 'HR', manager: 'Victoria', avatar: 'https://i.pravatar.cc/150?img=1', active: true },
        { id: 3, name: 'Marketing', manager: 'Alex', avatar: 'https://i.pravatar.cc/150?img=11', active: true },
        { id: 4, name: 'SMM', manager: 'Sophia', avatar: 'https://i.pravatar.cc/150?img=5', active: true },
        { id: 5, name: 'Sales', manager: 'Max', avatar: 'https://i.pravatar.cc/150?img=8', active: false },
        { id: 6, name: 'Support', manager: 'Elena', avatar: 'https://i.pravatar.cc/150?img=9', active: false },
        { id: 7, name: 'Analytics', manager: 'David', avatar: 'https://i.pravatar.cc/150?img=12', active: false },
        { id: 8, name: 'Design', manager: 'Mia', avatar: 'https://i.pravatar.cc/150?img=16', active: false },
        { id: 9, name: 'Development', manager: 'Ivan', avatar: 'https://i.pravatar.cc/150?img=33', active: false },
        { id: 10, name: 'Engineering', manager: 'Mark', avatar: 'https://i.pravatar.cc/150?img=60', active: false }
      ];

      const EMPLOYEES = [
        { id: 1, name: 'Victoria', role: 'AI Recruiter', avatar: 'https://i.pravatar.cc/150?img=1' },
        { id: 2, name: 'Alex', role: 'Media Buyer', avatar: 'https://i.pravatar.cc/150?img=11' },
        { id: 3, name: 'Sophia', role: 'Copywriter', avatar: 'https://i.pravatar.cc/150?img=5' },
        { id: 4, name: 'Max', role: 'Sales Closer', avatar: 'https://i.pravatar.cc/150?img=8' },
        { id: 5, name: 'Elena', role: 'Support Agent', avatar: 'https://i.pravatar.cc/150?img=9' },
        { id: 6, name: 'David', role: 'Data Analyst', avatar: 'https://i.pravatar.cc/150?img=12' },
        { id: 7, name: 'Mia', role: 'UI/UX Designer', avatar: 'https://i.pravatar.cc/150?img=16' },
        { id: 8, name: 'Ivan', role: 'Frontend Dev', avatar: 'https://i.pravatar.cc/150?img=33' },
        { id: 9, name: 'Herman', role: 'Strategist', avatar: 'https://i.pravatar.cc/150?img=59' },
        { id: 10, name: 'Mark', role: 'DevOps', avatar: 'https://i.pravatar.cc/150?img=60' }
      ];

      const getTasksForDept = (deptName) => {
        const taskMap = {
          'Management': ['Strategic Planning', 'KPI Monitoring', 'Risk Management', 'Process Optimization', 'Competitor Analysis', 'Crisis Management', 'Growth Hacking', 'Resource Allocation', 'Goal Tracking', 'Decision Audit'],
          'HR': ['Resume Screening', 'Initial Interview', 'Soft-skills Assessment', 'Onboarding', 'Engagement Surveys', 'Conflict Resolution', 'Burnout Analytics', 'Talent Retention', 'Performance Review', 'Offer Generation'],
          'Marketing': ['Target Audience Analysis', 'Media Planning', 'Creative Generation', 'Ad Setup', 'SEO Optimization', 'A/B Testing', 'Email Marketing', 'ROI Analytics', 'PR & Partnerships', 'Landing Page Creation'],
          'SMM': ['Content Planning', 'Copywriting', 'Visual Generation', 'Trend Analysis', 'Community Management', 'Targeted Ads', 'Influencer Marketing', 'Statistics Gathering', 'Reels / TikTok', 'Brand Monitoring'],
          'Sales': ['Cold Calling', 'Lead Processing', 'BANT Qualification', 'Demo Presentations', 'Objection Handling', 'Proposal Preparation', 'Deal Closing', 'Cross-selling', 'Funnel Analytics', 'CRM Management'],
          'Support': ['Ticket Resolution', 'Live Chat Support', 'FAQ Generation', 'User Feedback', 'Refund Processing', 'Knowledge Base', 'SLA Monitoring', 'Bug Reporting', 'Onboarding Help', 'Churn Prevention'],
          'Analytics': ['Data Parsing', 'Dashboard Creation', 'Metrics Tracking', 'Predictive Models', 'A/B Reporting', 'Cohort Analysis', 'User Journey Mapping', 'Revenue Forecasting', 'Event Tracking', 'Data Cleansing'],
          'Design': ['UI Prototyping', 'Banner Creation', 'Brand Identity', 'Asset Export', 'Design System', 'UX Research', 'Wireframing', 'Illustration', 'Motion Graphics', 'Design QA'],
          'Development': ['Code Generation', 'Bug Fixing', 'API Integration', 'Unit Testing', 'Code Review', 'Refactoring', 'Architecture Design', 'Performance Tuning', 'Database Migration', 'Documentation'],
          'Engineering': ['Architecture Design', 'DevOps Setup', 'Database Optimization', 'Security Audit', 'Server Scaling', 'CI/CD Pipelines', 'Cloud Management', 'Load Testing', 'Monitoring Setup', 'Incident Response']
        };
        return taskMap[deptName] || Array.from({ length: 10 }, (_, i) => `Task Resolution 0${i + 1}`);
      };

      const IconChevronDown = () => (
        <svg className="w-8 h-8 text-[#694EFE] animate-bounce" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 14l-7 7m0 0l-7-7m7 7V3" />
        </svg>
      );

      const IconLightning = ({ className = 'w-5 h-5' }) => (
        <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
        </svg>
      );

      const TaskIcon = ({ index, className = 'w-4 h-4' }) => {
        const icons = [
          <path strokeLinecap="round" strokeLinejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z" />,
          <path strokeLinecap="round" strokeLinejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />,
          <path strokeLinecap="round" strokeLinejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.965 11.965 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />,
          null,
          <path strokeLinecap="round" strokeLinejoin="round" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />,
          <path strokeLinecap="round" strokeLinejoin="round" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />,
          <path strokeLinecap="round" strokeLinejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />,
          <path strokeLinecap="round" strokeLinejoin="round" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9" />,
          <path strokeLinecap="round" strokeLinejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z m-3-7a9 9 0 100 18 9 9 0 000-18z" />,
          <path strokeLinecap="round" strokeLinejoin="round" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z" />
        ];

        if (index % 10 === 3) {
          return (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2">
              <path strokeLinecap="round" strokeLinejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
              <path strokeLinecap="round" strokeLinejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
          );
        }

        return (
          <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2">
            {icons[index % 10]}
          </svg>
        );
      };

      const getDeptIcon = (deptName, className) => {
        const icons = {
          Management: <path d="M22 12h-4l-3 9L9 3l-3 9H2" />,
          HR: <><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2" /><circle cx="9" cy="7" r="4" /><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75" /></>,
          Marketing: <><circle cx="12" cy="12" r="10" /><circle cx="12" cy="12" r="6" /><circle cx="12" cy="12" r="2" /></>,
          SMM: <><rect x="5" y="2" width="14" height="20" rx="2" ry="2" /><line x1="12" y1="18" x2="12.01" y2="18" /></>,
          Sales: <><line x1="12" y1="1" x2="12" y2="23" /><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6" /></>,
          Support: <><path d="M3 18v-6a9 9 0 0118 0v6" /><path d="M21 19a2 2 0 01-2 2h-1a2 2 0 01-2-2v-3a2 2 0 012-2h3zM3 19a2 2 0 002 2h1a2 2 0 002-2v-3a2 2 0 00-2-2H3z" /></>,
          Analytics: <><path d="M21.21 15.89A10 10 0 118 2.83M22 12A10 10 0 0012 2v10z" /></>,
          Design: <><rect x="3" y="3" width="18" height="18" rx="2" ry="2" /><line x1="3" y1="9" x2="21" y2="9" /><line x1="9" y1="21" x2="9" y2="9" /></>,
          Development: <><polyline points="16 18 22 12 16 6" /><polyline points="8 6 2 12 8 18" /></>,
          Engineering: <><rect x="4" y="4" width="16" height="16" rx="2" ry="2" /><rect x="9" y="9" width="6" height="6" /><line x1="9" y1="1" x2="9" y2="4" /><line x1="15" y1="1" x2="15" y2="4" /><line x1="9" y1="20" x2="9" y2="23" /><line x1="15" y1="20" x2="15" y2="23" /><line x1="20" y1="9" x2="23" y2="9" /><line x1="20" y1="14" x2="23" y2="14" /><line x1="1" y1="9" x2="4" y2="9" /><line x1="1" y1="14" x2="4" y2="14" /></>
        };

        return (
          <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
            {icons[deptName] || <circle cx="12" cy="12" r="10" />}
          </svg>
        );
      };

      const AnimatedSection = ({ children, status }) => {
        let transformClass = 'translate-y-32 scale-[0.98] opacity-0';
        if (status === 'active') transformClass = 'translate-y-0 scale-100 opacity-100 z-10';
        else if (status === 'prev') transformClass = '-translate-y-32 scale-[0.98] opacity-0 z-0';

        return (
          <section className={`absolute inset-0 w-full h-full flex flex-col items-center justify-center transition-opacity duration-700 ${status === 'active' ? 'pointer-events-auto' : 'pointer-events-none'}`}>
            <div className={`w-full h-full flex flex-col transition-all duration-[1000ms] ease-[cubic-bezier(0.22,1,0.36,1)] transform ${transformClass}`}>
              {children}
            </div>
          </section>
        );
      };

      function App() {
        const [currentSlide, setCurrentSlide] = useState(0);
        const [currentDeptIndex, setCurrentDeptIndex] = useState(0);

        const totalSlides = 3;
        const lastInteraction = useRef(Date.now());
        const touchStartY = useRef(0);

        const handleScrollForward = () => {
          const now = Date.now();
          if (currentSlide === 1 && currentDeptIndex < DEPARTMENTS.length - 1) {
            if (now - lastInteraction.current < 600) return;
            lastInteraction.current = now;
            setCurrentDeptIndex((prev) => prev + 1);
          } else if (currentSlide < totalSlides - 1) {
            if (now - lastInteraction.current < 1000) return;
            lastInteraction.current = now;
            setCurrentSlide((prev) => prev + 1);
          }
        };

        const handleScrollBackward = () => {
          const now = Date.now();
          if (currentSlide === 1 && currentDeptIndex > 0) {
            if (now - lastInteraction.current < 600) return;
            lastInteraction.current = now;
            setCurrentDeptIndex((prev) => prev - 1);
          } else if (currentSlide > 0) {
            if (now - lastInteraction.current < 1000) return;
            lastInteraction.current = now;
            setCurrentSlide((prev) => prev - 1);
          }
        };

        useEffect(() => {
          const handleWheel = (e) => {
            if (e.deltaY > 30) handleScrollForward();
            else if (e.deltaY < -30) handleScrollBackward();
          };

          const handleKeyDown = (e) => {
            const now = Date.now();
            if (currentSlide === 1) {
              if (e.key === 'ArrowRight') {
                if (now - lastInteraction.current > 300) {
                  lastInteraction.current = now;
                  if (currentDeptIndex < DEPARTMENTS.length - 1) setCurrentDeptIndex((prev) => prev + 1);
                }
                return;
              } else if (e.key === 'ArrowLeft') {
                if (now - lastInteraction.current > 300) {
                  lastInteraction.current = now;
                  if (currentDeptIndex > 0) setCurrentDeptIndex((prev) => prev - 1);
                }
                return;
              }
            }
            if (e.key === 'ArrowDown' || e.key === 'PageDown') handleScrollForward();
            else if (e.key === 'ArrowUp' || e.key === 'PageUp') handleScrollBackward();
          };

          const handleTouchStart = (e) => {
            touchStartY.current = e.touches[0].clientY;
          };

          const handleTouchEnd = (e) => {
            const deltaY = touchStartY.current - e.changedTouches[0].clientY;
            if (deltaY > 50) handleScrollForward();
            else if (deltaY < -50) handleScrollBackward();
          };

          window.addEventListener('wheel', handleWheel, { passive: true });
          window.addEventListener('keydown', handleKeyDown);
          window.addEventListener('touchstart', handleTouchStart, { passive: true });
          window.addEventListener('touchend', handleTouchEnd, { passive: true });

          return () => {
            window.removeEventListener('wheel', handleWheel);
            window.removeEventListener('keydown', handleKeyDown);
            window.removeEventListener('touchstart', handleTouchStart);
            window.removeEventListener('touchend', handleTouchEnd);
          };
        }, [currentSlide, currentDeptIndex]);

        const getSlideStatus = (slideIndex) => {
          if (slideIndex === currentSlide) return 'active';
          if (slideIndex < currentSlide) return 'prev';
          return 'next';
        };

        return (
          <div className="fixed inset-0 w-full h-full bg-[#EAEDF8] text-gray-900 font-sans selection:bg-[#694EFE] selection:text-white overflow-hidden">
            <style>{`
              @keyframes marquee-slow {
                0% { transform: translateX(0%); }
                100% { transform: translateX(-50%); }
              }
              .animate-marquee-slow {
                animation: marquee-slow 40s linear infinite;
              }
            `}</style>

            <AnimatedSection status={getSlideStatus(0)}>
              <div className="absolute top-4 md:top-8 left-0 right-0 w-full px-4 md:px-10 z-30 flex items-center justify-center max-w-7xl mx-auto">
                <img
                  src="https://i.ibb.co/tpgpGZ8Q/photo-2026-04-28-21-23-10.jpg"
                  alt="Logo"
                  className="absolute left-4 md:left-10 w-10 h-10 md:w-12 md:h-12 rounded-full object-cover shrink-0"
                />

                <div className="flex items-center justify-center gap-6 md:gap-8 overflow-x-auto pb-2" style={{ scrollbarWidth: 'none', msOverflowStyle: 'none' }}>
                  <style>{`.overflow-x-auto::-webkit-scrollbar { display: none; }`}</style>
                  {DEPARTMENTS.map((dept, idx) => (
                    <button
                      key={dept.id}
                      onClick={() => {
                        setCurrentDeptIndex(idx);
                        setCurrentSlide(1);
                      }}
                      className="whitespace-nowrap text-sm md:text-base font-normal text-gray-500 hover:text-[#694EFE] transition-colors relative group"
                    >
                      {dept.name}
                      <span className="absolute -bottom-1.5 left-0 w-0 h-[2px] bg-[#694EFE] transition-all duration-300 group-hover:w-full"></span>
                    </button>
                  ))}
                </div>
              </div>

              <div className="max-w-7xl mx-auto w-full h-full flex flex-col justify-center relative px-4 md:px-10">
                <div className="flex flex-col md:flex-row items-center justify-between w-full h-[70vh] gap-10 lg:gap-20 pt-16 md:pt-0">
                  <div
                    className="w-full md:w-1/2 h-[40vh] md:h-full relative rounded-3xl md:rounded-[2.5rem] overflow-hidden shadow-[0_20px_60px_-15px_rgba(105,78,254,0.25)] bg-white/40 border border-white/60 backdrop-blur-xl group"
                    style={{ WebkitMaskImage: '-webkit-radial-gradient(white, black)' }}
                  >
                    <div className="absolute inset-0 bg-gradient-to-br from-[#E7EAF5] via-white to-[#EAEDF8] group-hover:scale-105 transition-transform duration-1000 ease-out"></div>
                    <div className="absolute inset-0 flex flex-col items-center justify-center z-10 bg-black/5 group-hover:bg-transparent transition-colors duration-500">
                      <div className="w-16 h-16 md:w-20 md:h-20 bg-white/90 backdrop-blur-md rounded-full shadow-xl flex items-center justify-center text-[#694EFE] cursor-pointer group-hover:scale-110 group-hover:bg-[#694EFE] group-hover:text-white transition-all duration-300">
                        <svg className="w-8 h-8 md:w-10 md:h-10 ml-1 md:ml-2" fill="currentColor" viewBox="0 0 24 24">
                          <path d="M8 5v14l11-7z" />
                        </svg>
                      </div>
                    </div>
                    <div className="absolute top-0 left-0 right-0 h-[40%] bg-gradient-to-b from-white/60 to-transparent pointer-events-none z-20"></div>
                  </div>

                  <div className="w-full md:w-1/2 flex flex-col items-start text-left shrink-0 pt-6 md:pt-0">
                    <div className="inline-block mb-4 md:mb-6 px-4 py-1.5 rounded-full bg-white shadow-[0_8px_20px_-6px_#E9ECF7] text-sm font-semibold tracking-wide text-[#694EFE] uppercase">
                      Human Intelligence Platform
                    </div>

                    <h1 className="text-5xl sm:text-6xl md:text-7xl lg:text-[4.5rem] xl:text-[5.5rem] font-bold tracking-tight leading-[1.1] mb-6">
                      <span className="block text-transparent bg-clip-text bg-gradient-to-r from-[#694EFE] via-[#6850FC] to-[#6E4CFC] pb-1 pr-4 w-fit">Solopreneur's</span>
                      <span className="block text-gray-900 mt-1 md:mt-2">Superpower</span>
                    </h1>

                    <p className="text-lg md:text-2xl text-gray-500 max-w-xl font-light tracking-tight leading-relaxed">
                      <strong className="font-medium text-gray-800">100 AI employees</strong> in 1 platform with unified memory
                    </p>
                  </div>
                </div>

                <div onClick={() => setCurrentSlide(1)} className="absolute bottom-4 md:bottom-8 left-1/2 transform -translate-x-1/2 flex flex-col items-center opacity-60 hover:opacity-100 transition-opacity cursor-pointer z-20">
                  <IconChevronDown />
                </div>
              </div>
            </AnimatedSection>

            <AnimatedSection status={getSlideStatus(1)}>
              <div className="w-full h-full flex flex-col items-center justify-center overflow-hidden pt-8 pb-24 md:pb-32 relative">
                <div className="mb-6 md:mb-10 text-center shrink-0 px-4">
                  <h2 className="text-4xl md:text-5xl font-bold tracking-tight text-gray-900">Build Your AI Team</h2>
                </div>

                <div className="relative flex-grow w-full overflow-hidden">
                  <div className="flex w-full h-full transition-transform duration-700 ease-[cubic-bezier(0.22,1,0.36,1)]" style={{ transform: `translateX(-${currentDeptIndex * 100}%)` }}>
                    {DEPARTMENTS.map((dept, index) => (
                      <div key={index} className="w-full h-full shrink-0 flex items-center justify-center px-4 md:px-10">
                        <div className="w-full max-w-5xl h-full max-h-[750px] bg-white rounded-[2rem] md:rounded-[3rem] shadow-[0_20px_60px_-15px_rgba(105,78,254,0.15)] border border-white/60 overflow-hidden flex flex-col p-6 md:p-10 relative">
                          <div className="flex items-center justify-between gap-5 md:gap-6 mb-5 md:mb-8 z-10 border-b border-gray-100 pb-5 shrink-0 relative">
                            <div className="flex items-center gap-5 md:gap-6">
                              <img src={dept.avatar} alt={dept.manager} className="w-16 h-16 md:w-20 md:h-20 rounded-full border-2 border-[#694EFE]/20 object-cover shadow-sm shrink-0" />
                              <div className="flex flex-col justify-center">
                                <h3 className="text-2xl md:text-4xl font-bold text-gray-900 leading-tight mb-1 md:mb-2">{dept.name}</h3>
                                <span className="text-sm md:text-lg text-gray-500 font-medium leading-none">{dept.manager}</span>
                              </div>
                            </div>
                            <div className="opacity-[0.1] pointer-events-none pr-2 shrink-0">{getDeptIcon(dept.name, 'w-16 h-16 md:w-24 md:h-24 text-[#694EFE]')}</div>
                          </div>

                          <div className="flex-grow min-h-0 z-10 mb-5 md:mb-8 flex flex-col justify-center">
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-3 md:gap-y-4">
                              {getTasksForDept(dept.name).map((task, idx) => (
                                <div key={idx} className="flex items-center gap-3 md:gap-4 text-sm md:text-base text-gray-700">
                                  <div className="shrink-0 flex items-center justify-center pt-0.5">
                                    <TaskIcon index={idx} className="w-5 h-5 text-[#694EFE]" />
                                  </div>
                                  <span className="leading-tight font-medium">{task}</span>
                                </div>
                              ))}
                            </div>
                          </div>

                          <div className="mt-auto flex flex-col md:flex-row md:items-center justify-between border-t border-gray-100 pt-5 md:pt-6 z-10 shrink-0 gap-4 md:gap-6">
                            <div className="flex flex-col shrink-0">
                              <span className="text-4xl md:text-5xl font-bold text-gray-900 tracking-tight">$200</span>
                              <span className="text-sm text-gray-500 font-medium uppercase tracking-wider">per month</span>
                            </div>
                            <div className="flex flex-col sm:flex-row items-center gap-3 w-full md:w-auto">
                              <button className="w-full sm:w-auto h-12 md:h-14 bg-gray-100 hover:bg-gray-200 text-gray-600 px-6 rounded-2xl font-bold text-base md:text-lg transition-all shadow-sm active:scale-95 flex items-center justify-center gap-2 shrink-0 whitespace-nowrap">
                                Learn More
                              </button>
                              <button className="w-full sm:w-auto h-12 md:h-14 bg-[#694EFE] hover:bg-[#5840d4] text-white px-8 rounded-2xl font-bold text-base md:text-lg transition-all shadow-[0_10px_20px_-5px_rgba(105,78,254,0.4)] active:scale-95 hover:-translate-y-1 flex items-center justify-center gap-2 shrink-0 whitespace-nowrap">
                                <IconLightning className="w-5 h-5 shrink-0" /> Hire {dept.manager}
                              </button>
                            </div>
                          </div>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>

                <div onClick={() => handleScrollForward()} className="absolute bottom-4 md:bottom-8 left-1/2 transform -translate-x-1/2 flex flex-col items-center opacity-60 hover:opacity-100 transition-opacity cursor-pointer z-20">
                  <IconChevronDown />
                </div>
              </div>
            </AnimatedSection>

            <AnimatedSection status={getSlideStatus(2)}>
              <div className="w-full h-full flex flex-col justify-center items-center relative overflow-hidden pt-12 pb-12">
                <div className="max-w-5xl mx-auto text-center flex flex-col items-center px-4 mb-12 md:mb-16">
                  <h2 className="text-5xl md:text-7xl lg:text-[5.5rem] font-bold tracking-tighter mb-6 text-gray-900 leading-[1.1]">
                    Unified Memory. <br className="hidden md:block" />
                    <span className="text-transparent bg-clip-text bg-gradient-to-r from-[#694EFE] to-[#6E4CFC]">Limitless Synergy.</span>
                  </h2>

                  <p className="text-xl md:text-2xl text-gray-500 max-w-3xl mx-auto font-light leading-relaxed">
                    Why hire a single department when you can command the entire company? <strong className="text-gray-800 font-medium">All 100 AI employees</strong> connected to a single brain, executing tasks flawlessly.
                  </p>
                </div>

                <div className="w-[100vw] max-w-full relative flex items-center group overflow-hidden mb-16 md:mb-20">
                  <div className="absolute left-0 top-0 bottom-0 w-16 md:w-48 bg-gradient-to-r from-[#EAEDF8] to-transparent z-10 pointer-events-none"></div>
                  <div className="absolute right-0 top-0 bottom-0 w-16 md:w-48 bg-gradient-to-l from-[#EAEDF8] to-transparent z-10 pointer-events-none"></div>

                  <div className="flex gap-4 w-max animate-marquee-slow group-hover:[animation-play-state:paused] px-4">
                    {[...EMPLOYEES, ...EMPLOYEES, ...EMPLOYEES].map((emp, index) => (
                      <div key={index} className="flex items-center gap-4 bg-white/60 backdrop-blur-md rounded-full p-2 pr-4 border border-white/80 shadow-sm transition-transform hover:-translate-y-1 cursor-pointer">
                        <img src={emp.avatar} alt={emp.name} className="w-12 h-12 rounded-full border-2 border-white object-cover shadow-sm shrink-0" />
                        <div className="flex flex-col min-w-[120px]">
                          <span className="text-sm font-bold text-gray-900 leading-tight">{emp.name}</span>
                          <span className="text-xs text-gray-500 font-medium">{emp.role}</span>
                        </div>
                        <button className="bg-[#694EFE]/10 hover:bg-[#694EFE] text-[#694EFE] hover:text-white px-5 py-2.5 rounded-full text-xs font-bold transition-colors ml-2 shrink-0">Hire</button>
                      </div>
                    ))}
                  </div>
                </div>

                <div className="absolute bottom-4 md:bottom-6 w-full flex flex-col md:flex-row justify-center md:justify-between items-center px-6 md:px-12 text-xs md:text-sm text-gray-400 font-normal z-20 gap-2 md:gap-0">
                  <div>© {new Date().getFullYear()} Andre AI Technologies</div>
                  <div className="flex gap-6">
                    <a href="#" className="hover:text-[#694EFE] transition-colors">Privacy Policy</a>
                    <a href="#" className="hover:text-[#694EFE] transition-colors">Terms of Use</a>
                  </div>
                </div>
              </div>
            </AnimatedSection>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
  </body>
</html>
